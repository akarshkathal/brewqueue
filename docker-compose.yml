services:
  db:
    image: postgres:16
    container_name: brewqueue_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: brewuser
      POSTGRES_PASSWORD: brewpassword
      POSTGRES_DB: brewqueue
    ports:
      - '5432:5432'
    volumes:
      - brewqueue_data:/var/lib/postgresql/data

volumes:
  brewqueue_data: